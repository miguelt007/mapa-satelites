<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNC - Integrated Mission Control v18.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #020408; font-family: 'Courier New', monospace; overflow: hidden; color: #00f2ff; }
        #map { height: 100vh; width: 100%; background: #020408; }
        #hud { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(2, 4, 8, 0.95); border: 1px solid #00f2ff; padding: 15px; width: 350px; border-radius: 2px; }
        .status-bar { border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 8px; margin-bottom: 10px; font-size: 11px; }
        .clock-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        button { flex: 1; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; font-family: 'Courier New'; font-size: 10px; padding: 6px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #00f2ff; color: #000; }
        select, input { width: 100%; background: #000; border: 1px solid rgba(0, 242, 255, 0.5); color: #00f2ff; padding: 6px; font-family: 'Courier New'; margin-top: 5px; box-sizing: border-box; outline: none; }
        #sat-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid rgba(0, 242, 255, 0.2); }
        .sat-item { display: grid; grid-template-columns: 30px 1fr; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0, 242, 255, 0.1); cursor: pointer; font-size: 11px; }
        .sat-ring { width: 10px; height: 10px; border: 2px solid #00f2ff; border-radius: 50%; box-shadow: 0 0 8px #00f2ff; }
        
        /* Groundstation Icons */
        .icon-local { border: 2px solid #ffea00; background: rgba(255, 234, 0, 0.8); box-shadow: 0 0 15px #ffea00; border-radius: 50%; }
        .icon-dsn { border: 1px solid #39ff14; background: rgba(57, 255, 20, 0.5); transform: rotate(45deg); }
        .icon-gov { border: 1px solid #00f2ff; background: rgba(0, 242, 255, 0.4); }
        .icon-pvt { border: 1px solid #ff00ff; background: rgba(255, 0, 255, 0.4); }

        .leaflet-popup-content-wrapper { background: #000 !important; border: 1px solid #00f2ff; border-radius: 0; color: #fff; font-size: 11px; }
        .pop-title { color: #00f2ff; font-weight: bold; border-bottom: 1px solid #00f2ff; margin-bottom: 6px; display: block; }
        .pop-val { color: #39ff14; }
        #legend { position: absolute; bottom: 30px; left: 15px; z-index: 1000; background: rgba(2, 4, 8, 0.9); border: 1px solid rgba(0, 242, 255, 0.5); padding: 10px; font-size: 10px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="hud">
    <div class="status-bar">
        <div class="clock-row"><span>UTC:</span> <span id="utc-clock">00:00:00</span></div>
        <div class="clock-row"><span>LOC:</span> <span id="local-clock">00:00:00</span></div>
    </div>
    <select id="group-select" onchange="loadData(this.value)">
        <optgroup label="SNC STRATEGIC">
            <option value="PT">Portugal Strategic Assets</option>
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle">Weather (Meteorology)</option>
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=gnss&FORMAT=tle">GPS / GNSS (Global Nav)</option>
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=science&FORMAT=tle">Scientific Missions</option>
        </optgroup>
        <optgroup label="PRIVATE CONSTELLATIONS">
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle">Starlink (SpaceX)</option>
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=oneweb&FORMAT=tle">OneWeb</option>
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=planet&FORMAT=tle">Planet (Earth Obs)</option>
        </optgroup>
        <optgroup label="GLOBAL MONITOR">
            <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle">All Active Satellites</option>
        </optgroup>
    </select>
    <div class="btn-group">
        <button onclick="checkAll(true)">SELECT ALL</button>
        <button onclick="checkAll(false)">CLEAR ALL</button>
    </div>
    <input type="text" id="search-bar" placeholder="FILTER ORBITAL ASSETS..." onkeyup="filterList()">
    <div id="sat-list">UPLINKING...</div>
</div>

<div id="legend">
    <div style="display:flex; align-items:center; gap:8px;"><div style="width:10px; height:10px;" class="icon-local"></div> <span style="color:#ffea00;">OEIRAS SENSOR SITE</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px;" class="icon-dsn"></div> <span style="color:#39ff14;">DSN / ESTRACK NETWORK</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px;" class="icon-gov"></div> <span>Gov Spaceports</span></div>
    <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px;" class="icon-pvt"></div> <span>Private Launch Sites</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { worldCopyJump: true, zoomControl: false, attributionControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const ptLinks = [
        "https://celestrak.org/NORAD/elements/gp.php?CATNR=63488&FORMAT=TLE",
        "https://celestrak.org/NORAD/elements/gp.php?CATNR=63002&FORMAT=TLE",
        "https://celestrak.org/NORAD/elements/gp.php?CATNR=60238&FORMAT=TLE",
        "https://celestrak.org/NORAD/elements/gp.php?CATNR=22829&FORMAT=TLE"
    ];

    const groundStations = [
        { n: "OEIRAS SENSOR SITE", c: [38.6944381, -9.3089739], type: "local", spec: "Command Center" },
        // DEEP SPACE NETWORKS (DSN / ESTRACK)
        { n: "Madrid DSN (NASA)", c: [40.43, -4.24], type: "dsn", spec: "Deep Space Tracking" },
        { n: "Goldstone DSN (NASA)", c: [35.42, -116.89], type: "dsn", spec: "Deep Space Tracking" },
        { n: "Canberra DSN (NASA)", c: [-35.40, 148.98], type: "dsn", spec: "Deep Space Tracking" },
        { n: "Santa Maria (ESTRACK)", c: [36.99, -25.13], type: "dsn", spec: "ESA Ground Link" },
        { n: "Malargüe (ESTRACK)", c: [-35.77, -69.39], type: "dsn", spec: "ESA Ground Link" },
        { n: "New Norcia (ESTRACK)", c: [-31.04, 116.19], type: "dsn", spec: "ESA Ground Link" },
        // SPACEPORTS
        { n: "Baikonur", c: [45.96, 63.30], type: "gov", spec: "Roscosmos Hub" },
        { n: "Kennedy KSC", c: [28.57, -80.64], type: "gov", spec: "NASA Primary" },
        { n: "Jiuquan", c: [40.96, 100.29], type: "gov", spec: "CNSA Hub" },
        { n: "Starbase", c: [25.99, -97.15], type: "pvt", spec: "SpaceX Starship" },
        { n: "Kourou", c: [5.23, -52.76], type: "gov", spec: "ESA Hub" }
    ];

    groundStations.forEach(s => {
        L.marker(s.c, { icon: L.divIcon({className: 'icon-' + s.type, iconSize:[8,8]}) })
         .bindPopup(`<span class="pop-title">${s.n}</span>TYPE: ${s.spec}<br>STATUS: <span class="pop-val">OPERATIONAL</span>`).addTo(map);
    });

    let satellites = [];
    const satIcon = L.divIcon({ className: 'sat-icon-minimal', html: '<div class="sat-ring"></div>', iconSize: [12, 12] });

    async function loadData(url) {
        const listDiv = document.getElementById('sat-list');
        listDiv.innerHTML = 'ESTABLISHING DATA LINK...';
        clearSatellites();
        satellites = [];
        try {
            let rawData = "";
            if(url === "PT") {
                const results = await Promise.allSettled(ptLinks.map(link => fetch(link).then(r => r.text())));
                rawData = results.filter(r => r.status === 'fulfilled').map(r => r.value.trim()).join("\n");
            } else {
                const resp = await fetch(url);
                rawData = await resp.text();
            }
            parseTLE(rawData);
        } catch (e) { listDiv.innerHTML = "LINK FAILURE"; }
    }

    function parseTLE(data) {
        const lines = data.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const listDiv = document.getElementById('sat-list');
        listDiv.innerHTML = '';
        for (let i = 0; i < lines.length - 2; i += 3) {
            const name = lines[i], l1 = lines[i+1], l2 = lines[i+2];
            if (l1.startsWith('1') && l2.startsWith('2')) {
                const satrec = satellite.twoline2satrec(l1, l2);
                const id = l1.substring(2, 7).trim();
                const yr = parseInt(l1.substring(18, 20));
                const fullYr = (yr < 57) ? 2000 + yr : 1900 + yr;
                const tDate = new Date(fullYr, 0);
                tDate.setDate(tDate.getDate() + parseFloat(l1.substring(20, 32)) - 1);
                const ageDays = (new Date() - tDate) / (1000 * 3600 * 24);
                let realStatus = ageDays < 25 ? "ACTIVE" : "INACTIVE";

                const obj = { 
                    name, id, satrec, realStatus,
                    marker: L.marker([0, 0], { icon: satIcon }).bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label', offset: [5, 0] }),
                    trail: L.polyline([], { color: '#00f2ff', weight: 1, opacity: 0.3 }),
                    circle: L.circle([0, 0], { radius: 0, color: '#00f2ff', weight: 1, fillOpacity: 0.05, interactive: false }),
                    active: false 
                };
                obj.marker.on('click', () => updatePopup(obj));
                satellites.push(obj);
                const d = document.createElement('div');
                d.className = 'sat-item';
                d.innerHTML = `<input type="checkbox"> <span>${name}</span>`;
                d.onclick = (e) => { 
                    let c = d.querySelector('input'); 
                    if(e.target !== c) c.checked = !c.checked; 
                    toggleSat(obj, c.checked); 
                };
                listDiv.appendChild(d);
            }
        }
    }

    function getSatState(sat) {
        try {
            const now = new Date(), gmst = satellite.gstime(now), pv = satellite.propagate(sat.satrec, now);
            if (pv.position && pv.velocity) {
                const gd = satellite.eciToGeodetic(pv.position, gmst);
                const v = Math.sqrt(Math.pow(pv.velocity.x,2) + Math.pow(pv.velocity.y,2) + Math.pow(pv.velocity.z,2));
                return { lat: satellite.degreesLat(gd.latitude), lng: satellite.degreesLong(gd.longitude), alt: gd.height, vel: v, rad: 6371 * Math.acos(6371/(6371+gd.height)) * 1000 };
            }
        } catch(e) { return null; }
    }

    function updatePopup(sat) {
        const s = getSatState(sat);
        if(s) {
            sat.marker.bindPopup(`
                <span class="pop-title">${sat.name}</span>
                ID: <span class="pop-val">${sat.id}</span><br>
                ALT: <span class="pop-val">${s.alt.toFixed(2)} KM</span><br>
                VEL: <span class="pop-val">${s.vel.toFixed(3)} KM/S</span><br>
                POS: <span class="pop-val">${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}</span><br>
                STATUS: <span style="color:${sat.realStatus === 'ACTIVE'?'#39ff14':'#ff4e00'}">${sat.realStatus}</span>
            `).openPopup();
        }
    }

    function toggleSat(s, show) {
        s.active = show;
        if (show) { s.marker.addTo(map); s.trail.addTo(map); s.circle.addTo(map); }
        else { map.removeLayer(s.marker); map.removeLayer(s.trail); map.removeLayer(s.circle); }
    }

    function clearSatellites() { satellites.forEach(s => { map.removeLayer(s.marker); map.removeLayer(s.trail); map.removeLayer(s.circle); }); }

    function update() {
        const now = new Date();
        satellites.forEach(sat => {
            if (!sat.active) return;
            const s = getSatState(sat);
            if (s) {
                sat.marker.setLatLng([s.lat, s.lng]);
                sat.circle.setLatLng([s.lat, s.lng]).setRadius(s.rad);
                if(sat.marker.getPopup() && sat.marker.getPopup().isOpen()) updatePopup(sat);
                let pts = [];
                for(let j=0; j<8; j++){
                    let oldT = new Date(now.getTime() - (j * 40000)), pv = satellite.propagate(sat.satrec, oldT);
                    if(pv.position){
                        let og = satellite.eciToGeodetic(pv.position, satellite.gstime(oldT));
                        pts.push([satellite.degreesLat(og.latitude), satellite.degreesLong(og.longitude)]);
                    }
                }
                sat.trail.setLatLngs(pts);
            }
        });
        document.getElementById('utc-clock').innerText = now.toISOString().substr(11, 8);
        document.getElementById('local-clock').innerText = new Date().toLocaleTimeString();
        requestAnimationFrame(update);
    }

    function checkAll(v) { document.querySelectorAll('.sat-item input').forEach((c, i) => { c.checked = v; toggleSat(satellites[i], v); }); }
    function filterList() {
        let q = document.getElementById('search-bar').value.toUpperCase();
        document.querySelectorAll('.sat-item').forEach(el => el.style.display = el.innerText.toUpperCase().includes(q) ? 'grid' : 'none');
    }

    loadData('PT');
    update();
</script>
</body>
</html>
