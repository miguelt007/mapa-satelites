<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0d17; font-family: monospace; }
        #map { height: 100vh; width: 100%; background: #0b0d17; }

        /* Estilo das Bases (Quadrados Ciano) */
        .base-square {
            background-color: rgba(0, 242, 255, 0.2);
            border: 2px solid #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
        }

        /* Estilo dos Satélites (Pontos Laranja) */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffb86c;
        }

        /* Nomes dos Satélites */
        .sat-label {
            color: #ffb86c;
            font-size: 11px;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
        }

        /* Popups Estilo Dark */
        .leaflet-popup-content-wrapper { background: #111; color: #00f2ff; border: 1px solid #00f2ff; }
        .leaflet-popup-tip { background: #00f2ff; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 3);
    
    // Mapa escuro com linhas de grelha sutis
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: 'Real-time Satellite Tracking'
    }).addTo(map);

    const baseIcon = L.divIcon({ className: 'base-square', iconSize: [12, 12] });
    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [6, 6] });

    // Bases de Lançamento
    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur Cosmodrome", coords: [45.96, 63.30] },
        { name: "Kourou", coords: [5.23, -52.76] },
        { name: "Alcantara", coords: [-2.37, -44.39] },
        { name: "Plesetsk", coords: [62.92, 40.57] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon }).bindPopup(base.name).addTo(map);
    });

    let satellites = [];

    async function fetchLiveTLE() {
        // Usamos um Proxy CORS para poder ler do Celestrak diretamente no navegador
        const url = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle';
        const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);

        try {
            const response = await fetch(proxy);
            const rawData = await response.json();
            const data = rawData.contents;
            
            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            // Limpa satélites antigos se existirem
            satellites.forEach(s => map.removeLayer(s.marker));
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
                
                if (satrec) {
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { permanent: true, className: 'sat-label', offset: [8, 0] })
                        .addTo(map);

                    satellites.push({ name, satrec, marker });
                }
            }
            updatePositions();
        } catch (e) {
            console.error("Erro ao carregar dados live:", e);
        }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                const lat = satellite.degreesLat(posGd.latitude);
                const lng = satellite.degreesLong(posGd.longitude);
                
                sat.marker.setLatLng([lat, lng]);
            }
        });
        requestAnimationFrame(updatePositions);
    }

    // Atualiza os dados TLE a cada 1 hora para manter precisão máxima
    fetchLiveTLE();
    setInterval(fetchLiveTLE, 3600000);

</script>
</body>
</html>
