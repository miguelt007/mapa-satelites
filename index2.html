<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Bases Quadradas Pequenas */
        .base-square {
            background-color: transparent;
            border: 1px solid #00f2ff;
            box-shadow: 0 0 4px #00f2ff;
        }

        /* Satélites (Pontos Laranja) */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            box-shadow: 0 0 6px #ffb86c;
            border: 1px solid #fff;
        }

        /* Nomes dos Satélites */
        .sat-label {
            color: #ffb86c !important;
            font-size: 9px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
        }

        .leaflet-container { background: #05070a !important; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false,
        attributionControl: false 
    }).setView([20, 0], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Ícones
    const baseIcon = L.divIcon({ className: 'base-square', iconSize: [6, 6] });
    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [5, 5] });

    // Bases
    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur", coords: [45.96, 63.30] },
        { name: "Kourou", coords: [5.23, -52.76] },
        { name: "Plesetsk", coords: [62.92, 40.57] },
        { name: "Jiuquan", coords: [40.96, 100.29] },
        { name: "Alcântara", coords: [-2.37, -44.39] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon }).bindPopup(base.name).addTo(map);
    });

    let satellites = [];

    async function fetchTLE() {
        const tleUrl = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle';
        // Novo Proxy mais rápido e estável
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(tleUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Erro na resposta do servidor");
            
            // Lemos como TEXTO puro para evitar o erro de JSON "Oops..."
            const data = await response.text();
            
            if (data.includes("Oops") || data.length < 100) {
                throw new Error("Proxy retornou erro ou dados insuficientes");
            }

            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            satellites.forEach(s => map.removeLayer(s.marker));
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const tle1 = lines[i+1].trim();
                const tle2 = lines[i+2].trim();
                
                try {
                    const satrec = satellite.twoline2satrec(tle1, tle2);
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { 
                            permanent: true, 
                            direction: 'right', 
                            className: 'sat-label' 
                        })
                        .addTo(map);

                    satellites.push({ name, satrec, marker });
                } catch (e) {}
            }
            updatePositions();
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            // Se falhar, tenta novamente em 30 segundos
            setTimeout(fetchTLE, 30000);
        }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            const posEci = posVel.position;
            
            if (posEci) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posEci, gmst);
                sat.marker.setLatLng([
                    satellite.degreesLat(posGd.latitude),
                    satellite.degreesLong(posGd.longitude)
                ]);
            }
        });
        requestAnimationFrame(updatePositions);
    }

    fetchTLE();
    // Atualiza dados a cada 12 horas
    setInterval(fetchTLE, 43200000);

</script>
</body>
</html>
