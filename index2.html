<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Bases Quadradas Pequenas (Ciano) */
        .base-square {
            background-color: transparent;
            border: 1px solid #00f2ff;
            box-shadow: 0 0 5px #00f2ff;
        }

        /* Satélites (Pontos Laranja) */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            box-shadow: 0 0 6px #ffb86c;
            border: 1px solid #fff;
        }

        /* Nomes dos Satélites (Estilo da Imagem) */
        .sat-label {
            color: #ffb86c !important;
            font-size: 9px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false,
        attributionControl: false 
    }).setView([20, 0], 3);

    // Mapa base escuro
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const baseIcon = L.divIcon({ className: 'base-square', iconSize: [6, 6] });
    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [5, 5] });

    // Bases de Lançamento
    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur", coords: [45.96, 63.30] },
        { name: "Kourou", coords: [5.23, -52.76] },
        { name: "Plesetsk", coords: [62.92, 40.57] },
        { name: "Jiuquan", coords: [40.96, 100.29] },
        { name: "Alcântara", coords: [-2.37, -44.39] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon }).bindPopup(base.name).addTo(map);
    });

    let satellites = [];

    async function fetchTLE() {
        // Usando o grupo "visual" que é o mais garantido de carregar
        const tleUrl = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=visual&FORMAT=tle';
        // Proxy AllOrigins configurado para ignorar cache e erros de rede
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(tleUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = json.contents;
            
            if (!data) return;

            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            // Limpa o que já existe
            satellites.forEach(s => map.removeLayer(s.marker));
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const tle1 = lines[i+1].trim();
                const tle2 = lines[i+2].trim();
                
                try {
                    const satrec = satellite.twoline2satrec(tle1, tle2);
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label' })
                        .addTo(map);

                    satellites.push({ satrec, marker });
                } catch (e) {}
            }
            updatePositions();
        } catch (error) {
            console.log("A aguardar ligação...");
            setTimeout(fetchTLE, 5000); // Tenta de novo se falhar
        }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                sat.marker.setLatLng([
                    satellite.degreesLat(posGd.latitude),
                    satellite.degreesLong(posGd.longitude)
                ]);
            }
        });
        requestAnimationFrame(updatePositions);
    }

    fetchTLE();
    setInterval(fetchTLE, 43200000); // 12 horas
</script>
</body>
</html>
