<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Estilo das Bases */
        .base-square { border: 1px solid #00f2ff; box-shadow: 0 0 5px #00f2ff; }

        /* Satélites: Ponto Laranja Brilhante (Glow) */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            border: 1px solid #fff;
            box-shadow: 0 0 10px #ffb86c, 0 0 20px #ff8c00;
        }

        /* Nomes: Limpos e sem setas */
        .sat-label {
            color: #ffb86c !important;
            font-size: 10px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Remove a seta do tooltip */
        .leaflet-tooltip-right:before { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false, 
        attributionControl: false 
    }).setView([20, 0], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [6, 6] });

    let satellites = [];

    async function fetchTLE() {
        try {
            const response = await fetch('data.tle');
            const data = await response.text();
            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            satellites.forEach(s => { map.removeLayer(s.marker); map.removeLayer(s.polyline); });
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
                if (satrec) {
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label', offset: [8, 0] })
                        .addTo(map);

                    const polyline = L.polyline([], { color: '#ffb86c', weight: 1.5, opacity: 0.6 }).addTo(map);
                    satellites.push({ satrec, marker, polyline });
                }
            }
            updatePositions();
        } catch (e) { setTimeout(fetchTLE, 5000); }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                const curLat = satellite.degreesLat(posGd.latitude);
                const curLng = satellite.degreesLong(posGd.longitude);
                
                sat.marker.setLatLng([curLat, curLng]);

                // GERAÇÃO DO RASTO CURTO (5 minutos)
                let trailCoords = [];
                let crossAntimeridian = false;

                for (let j = 0; j <= 5; j++) {
                    const pastTime = new Date(now.getTime() - (j * 60000));
                    const pPv = satellite.propagate(sat.satrec, pastTime);
                    if (pPv.position) {
                        const pGmst = satellite.gstime(pastTime);
                        const pGd = satellite.eciToGeodetic(pPv.position, pGmst);
                        const pLat = satellite.degreesLat(pGd.latitude);
                        const pLng = satellite.degreesLong(pGd.longitude);

                        // Deteta se o rasto cruza o limite do mapa para evitar a linha horizontal
                        if (trailCoords.length > 0) {
                            const lastLng = trailCoords[trailCoords.length - 1][1];
                            if (Math.abs(pLng - lastLng) > 180) crossAntimeridian = true;
                        }
                        trailCoords.push([pLat, pLng]);
                    }
                }

                // Se não cruzar o limite do mapa, desenha a cauda. Se cruzar, esconde-a nesse momento.
                if (!crossAntimeridian) {
                    sat.polyline.setLatLngs(trailCoords);
                } else {
                    sat.polyline.setLatLngs([]);
                }
            }
        });
        requestAnimationFrame(updatePositions);
    }

    fetchTLE();
</script>
</body>
</html>
