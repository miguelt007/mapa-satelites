<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker - Meteor Effect</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Bases Quadradas Ciano */
        .base-square {
            background: none;
            border: 1px solid #00f2ff;
            box-shadow: 0 0 8px #00f2ff, inset 0 0 2px #00f2ff;
        }

        /* Satélites: Ponto Central Super Brilhante */
        .sat-point {
            background-color: #fff; /* Núcleo branco para parecer mais quente */
            border-radius: 50%;
            border: 2px solid #ffb86c;
            box-shadow: 0 0 10px #ffb86c, 0 0 20px #ff8c00;
        }

        /* Nomes: Laranja Neon */
        .sat-label {
            color: #ffb86c !important;
            font-size: 11px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 0 0 5px #000, 1px 1px 2px #000;
            font-weight: bold;
            white-space: nowrap;
        }

        .leaflet-tooltip-right:before { display: none !important; }

        /* Filtro de Glow para as camadas da cauda */
        .meteor-layer {
            filter: blur(2px); /* Suaviza as bordas para parecer fumo/luz */
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false, 
        attributionControl: false 
    }).setView([20, 0], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const baseIcon = L.divIcon({ className: 'base-square', iconSize: [8, 8] });
    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [6, 6] });

    // Bases Repostas
    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur Cosmodrome", coords: [45.96, 63.30] },
        { name: "Plesetsk Cosmodrome", coords: [62.92, 40.57] },
        { name: "Kourou Space Centre", coords: [5.23, -52.76] },
        { name: "Jiuquan Space Center", coords: [40.96, 100.29] },
        { name: "Alcântara Launch Center", coords: [-2.37, -44.39] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon }).bindPopup(base.name).addTo(map);
    });

    let satellites = [];

    async function fetchTLE() {
        try {
            const response = await fetch('data.tle');
            const data = await response.text();
            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            satellites.forEach(s => { 
                map.removeLayer(s.marker); 
                s.layers.forEach(l => map.removeLayer(l));
            });
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
                if (satrec) {
                    const marker = L.marker([0, 0], { icon: satIcon, zIndexOffset: 1000 })
                        .bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label', offset: [12, 0] })
                        .addTo(map);

                    // 4 CAMADAS PARA O EFEITO METEORO
                    const layers = [
                        L.polyline([], { color: '#ff8c00', weight: 8, opacity: 0.1, className: 'meteor-layer' }).addTo(map), // Glow exterior largo
                        L.polyline([], { color: '#ffb86c', weight: 4, opacity: 0.3, className: 'meteor-layer' }).addTo(map), // Cauda média
                        L.polyline([], { color: '#ffb86c', weight: 2, opacity: 0.6, className: 'meteor-layer' }).addTo(map), // Brilho interno
                        L.polyline([], { color: '#ffffff', weight: 1, opacity: 0.9, className: 'meteor-layer' }).addTo(map)  // Núcleo branco fino
                    ];

                    satellites.push({ satrec, marker, layers });
                }
            }
            updatePositions();
        } catch (e) { setTimeout(fetchTLE, 5000); }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                const curLat = satellite.degreesLat(posGd.latitude);
                const curLng = satellite.degreesLong(posGd.longitude);
                
                sat.marker.setLatLng([curLat, curLng]);

                // Cálculo de 1 minuto de rasto (muito curto para efeito de impacto)
                let trailCoords = [];
                for (let j = 0; j <= 1.2; j += 0.2) {
                    const pTime = new Date(now.getTime() - (j * 60000));
                    const pPv = satellite.propagate(sat.satrec, pTime);
                    if (pPv.position) {
                        const pGmst = satellite.gstime(pTime);
                        const pGd = satellite.eciToGeodetic(pPv.position, pGmst);
                        trailCoords.push([satellite.degreesLat(pGd.latitude), satellite.degreesLong(pGd.longitude)]);
                    }
                }

                if (trailCoords.length > 1) {
                    const lngs = trailCoords.map(c => c[1]);
                    if (Math.max(...lngs) - Math.min(...lngs) < 180) {
                        // Distribuímos os pontos pelas camadas para criar o efeito afilado
                        sat.layers[0].setLatLngs(trailCoords); // Cauda longa e larga
                        sat.layers[1].setLatLngs(trailCoords.slice(0, 4)); 
                        sat.layers[2].setLatLngs(trailCoords.slice(0, 3)); 
                        sat.layers[3].setLatLngs(trailCoords.slice(0, 2)); // Núcleo curto
                    } else {
                        sat.layers.forEach(l => l.setLatLngs([]));
                    }
                }
            }
        });
        requestAnimationFrame(updatePositions);
    }

    fetchTLE();
</script>
</body>
</html>
