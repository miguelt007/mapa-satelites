<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Satellite Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; }
        #map { height: 100vh; width: 100%; }
        
        /* Estilo das Bases (Quadrados) */
        .base-square {
            background-color: #00f2ff;
            border: 1px solid #fff;
            box-shadow: 0 0 8px #00f2ff;
        }

        /* Tooltip e Popup Dark */
        .leaflet-popup-content-wrapper { background: #111; color: #fff; border: 1px solid #444; }
        .leaflet-popup-tip { background: #111; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    // 1. Configuração do Mapa Escuro
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 2. Bases de Lançamento (Quadrados conforme pedido)
    const baseIcon = L.divIcon({
        className: 'base-square',
        iconSize: [10, 10]
    });

    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur Cosmodrome", coords: [45.96, 63.30] },
        { name: "Plesetsk Cosmodrome", coords: [62.92, 40.57] },
        { name: "Kourou", coords: [5.23, -52.76] },
        { name: "Jiuquan", coords: [40.96, 100.29] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon })
            .bindPopup(`<b>Base de Lançamento:</b><br>${base.name}`)
            .addTo(map);
    });

    // 3. Lógica de Tracking em Tempo Real via TLE
    const satellites = [];

    async function fetchSatellites() {
        // Usando o link fornecido (Nota: Pode haver erro de CORS se o Celestrak não permitir acesso direto via JS)
        // Se falhar, usa-se um proxy ou ficheiro local
        const response = await fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle');
        const data = await response.text();
        const lines = data.split('\n');

        for (let i = 0; i < lines.length - 2; i += 3) {
            const name = lines[i].trim();
            const tle1 = lines[i+1];
            const tle2 = lines[i+2];
            
            if (tle1 && tle2) {
                addSatellite(name, tle1, tle2);
            }
        }
    }

    function addSatellite(name, tle1, tle2) {
        const satrec = satellite.twoline2satrec(tle1, tle2);
        const color = name.includes('ISS') ? '#ff3300' : '#00ffcc';
        
        const dot = L.circleMarker([0, 0], { 
            radius: 3, color: color, fillOpacity: 1 
        }).addTo(map);
        
        const rasto = L.polyline([], { color: color, weight: 1, opacity: 0.4 }).addTo(map);
        const history = [];

        satellites.push({ satrec, dot, rasto, history, name });
    }

    function updatePositions() {
        const now = new Date();
        
        satellites.forEach(sat => {
            const positionAndVelocity = satellite.propagate(sat.satrec, now);
            const positionEci = positionAndVelocity.position;
            const gmst = satellite.gstime(now);
            const positionGd = satellite.eciToGeodetic(positionEci, gmst);

            const lat = satellite.degreesLat(positionGd.latitude);
            const lng = satellite.degreesLong(positionGd.longitude);

            const newPos = [lat, lng];
            sat.dot.setLatLng(newPos);
            
            // Atualiza popup com dados reais
            sat.dot.bindPopup(`<b>${sat.name}</b><br>Alt: ${positionGd.height.toFixed(2)} km`);

            // Gestão do Rasto (Mantém os últimos 20 pontos para performance)
            sat.history.push(newPos);
            if (sat.history.length > 20) sat.history.shift();
            sat.rasto.setLatLngs(sat.history);
        });

        requestAnimationFrame(updatePositions);
    }

    fetchSatellites().then(() => {
        updatePositions(); // Inicia o loop de tempo real
    });

</script>
</body>
</html>
