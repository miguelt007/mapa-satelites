<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0d1117; /* Fundo escuro como a imagem */
            font-family: 'Courier New', Courier, monospace; /* Fonte técnica */
        }
        #map { height: 100vh; width: 100%; }

        /* Estilo para as Bases de Lançamento (Quadrados Brilhantes) */
        .base-square {
            background-color: transparent;
            border: 2px solid #00f2ff; /* Ciano brilhante */
            border-radius: 0;
            box-shadow: 0 0 10px #00f2ff, inset 0 0 10px #00f2ff;
        }

        /* Estilo para os Satélites (Pontos Brilhantes) */
        .sat-point {
            background-color: #ffb86c; /* Amarelo/Laranja claro como a imagem */
            border: 1px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb86c;
        }

        /* Estilo para os Nomes dos Satélites (Etiquetas de Texto) */
        .sat-label {
            color: #ffb86c; /* Mesma cor do satélite */
            font-size: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            border: none;
            background: none;
            margin-top: -5px; /* Ajuste para não cobrir o ponto */
            white-space: nowrap;
        }

        /* Estilo Dark para os Popups ao Clicar */
        .leaflet-popup-content-wrapper {
            background: rgba(13, 17, 23, 0.9);
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
        }
        .leaflet-popup-tip { background: #30363d; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    // 1. Configuração do Mapa Escuro (CartoDB Dark Matter para o fundo preto/cianico)
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
    }).addTo(map);

    // 2. Definir ícones personalizados com CSS para Bases (Quadrados) e Satélites (Pontos)
    const baseIcon = L.divIcon({
        className: 'base-square',
        iconSize: [12, 12], // Tamanho do quadrado
        iconAnchor: [6, 6]   // Ponto de ancoragem centralizado
    });

    const satIcon = L.divIcon({
        className: 'sat-point',
        iconSize: [6, 6],   // Tamanho do ponto
        iconAnchor: [3, 3]   // Ponto de ancoragem centralizado
    });

    // 3. Adicionar as Bases de Lançamento (Exemplos principais)
    const launchBases = [
        { name: "Kennedy Space Center (USA)", coords: [28.5729, -80.6490] },
        { name: "Baikonur Cosmodrome (KAZ)", coords: [45.9646, 63.3052] },
        { name: "Kourou (Guyana/ESA)", coords: [5.2393, -52.7686] },
        { name: "Plesetsk Cosmodrome (RUS)", coords: [62.9257, 40.5786] },
        { name: "Jiuquan (CHN)", coords: [40.9606, 100.2982] },
        { name: "Tanegashima (JPN)", coords: [30.3751, 130.9701] },
        { name: "Sriharikota (IND)", coords: [13.7199, 80.2300] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon })
            .bindPopup(`<b>Base de Lançamento</b><br>${base.name}`)
            .addTo(map);
    });

    // 4. Lógica para Satélites em Tempo Real
    let satellites = []; // Armazena os dados dos satélites ativos

    // Função para carregar o arquivo TLE localmente
    async function loadTLEFile() {
        try {
            // Tenta carregar o arquivo 'gp.txt' do mesmo diretório
            const response = await fetch('gp.txt');
            if (!response.ok) throw new Error('Não foi possível carregar o arquivo gp.txt');
            const data = await response.text();
            
            // Divide o arquivo em linhas e limpa espaços vazios
            const lines = data.split('\n').filter(line => line.trim().length > 0);
            
            // Processa TLE em grupos de 3 linhas
            for (let i = 0; i < lines.length - 2; i += 3) {
                const satrec = satellite.twoline2satrec(lines[i+1].trim(), lines[i+2].trim());
                if (satrec) {
                    // Adiciona o satélite com seu nome (primeira linha) e registro de órbita
                    satellites.push({
                        name: lines[i].trim(),
                        satrec: satrec,
                        marker: null // Será criado na primeira atualização
                    });
                }
            }
            updateSatellitePositions(); // Inicia a atualização
        } catch (error) {
            console.error("Erro no carregamento TLE:", error);
            alert("Erro: O ficheiro gp.txt não foi encontrado. Certifique-se de que o ficheiro gp.txt está na mesma pasta que o index2.html.");
        }
    }

    // Função para calcular e atualizar posições em tempo real
    function updateSatellitePositions() {
        const now = new Date(); // Hora atual do sistema

        satellites.forEach(sat => {
            // Calcula a posição orbital usando propagation.eci
            const positionAndVelocity = satellite.propagate(sat.satrec, now);
            const positionEci = positionAndVelocity.position;
            
            // Se a posição for válida (satélite não reentrou na atmosfera)
            if (positionEci) {
                const gmst = satellite.gstime(now); // Tempo sideral médio de Greenwich
                // Converte posição ECI para coordenadas geodéticas (Lat/Lng/Alt)
                const positionGd = satellite.eciToGeodetic(positionEci, gmst);

                // Converte radianos para graus
                const lat = satellite.degreesLat(positionGd.latitude);
                const lng = satellite.degreesLong(positionGd.longitude);
                const currentPos = [lat, lng];

                if (!sat.marker) {
                    // Cria o marcador com ícone de ponto e etiqueta de nome na primeira vez
                    sat.marker = L.marker(currentPos, { icon: satIcon })
                        .bindTooltip(sat.name, {
                            permanent: true, // Nome sempre visível
                            direction: 'right', // Nome à direita do ponto
                            className: 'sat-label', // Estilo CSS
                            offset: [5, 0] // Pequeno ajuste de posição
                        })
                        .addTo(map);
                } else {
                    // Apenas move o marcador para a nova posição
                    sat.marker.setLatLng(currentPos);
                }
            }
        });

        // Loop de animação suave (aprox. 60 vezes por segundo)
        requestAnimationFrame(updateSatellitePositions);
    }

    // Iniciar o processo
    loadTLEFile();

</script>
</body>
</html>
