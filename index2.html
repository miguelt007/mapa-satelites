<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro - Meteor Trail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Bases Quadradas Ciano */
        .base-square { border: 1px solid #00f2ff; box-shadow: 0 0 5px #00f2ff; }

        /* Satélites: Ponto Laranja com Brilho Intenso */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            border: 1px solid #fff;
            box-shadow: 0 0 12px #ffb86c, 0 0 20px #ff8c00;
            z-index: 1000 !important;
        }

        /* Nomes: Laranja e sem setas */
        .sat-label {
            color: #ffb86c !important;
            font-size: 10px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
            white-space: nowrap;
        }

        .leaflet-tooltip-right:before { display: none !important; }

        /* Estilo da Cauda de Meteoro (Gradiente via Máscara) */
        .meteor-trail {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
            /* Filtro de brilho para a cauda */
            filter: drop-shadow(0 0 3px #ffb86c);
            stroke-linecap: round;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false, 
        attributionControl: false 
    }).setView([20, 0], 3);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [6, 6] });

    let satellites = [];

    async function fetchTLE() {
        try {
            const response = await fetch('data.tle');
            const data = await response.text();
            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            satellites.forEach(s => { map.removeLayer(s.marker); map.removeLayer(s.polyline); });
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
                if (satrec) {
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label', offset: [10, 0] })
                        .addTo(map);

                    // A cauda começa com opacidade menor (0.8)
                    const polyline = L.polyline([], { 
                        color: '#ffb86c', 
                        weight: 2, 
                        opacity: 0.7,
                        className: 'meteor-trail' 
                    }).addTo(map);

                    satellites.push({ satrec, marker, polyline });
                }
            }
            updatePositions();
        } catch (e) { setTimeout(fetchTLE, 5000); }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                const curLat = satellite.degreesLat(posGd.latitude);
                const curLng = satellite.degreesLong(posGd.longitude);
                
                sat.marker.setLatLng([curLat, curLng]);

                // RASTO MUITO CURTO (2 minutos para efeito de meteoro)
                let trailCoords = [];
                for (let j = 0; j <= 2; j++) {
                    const pastTime = new Date(now.getTime() - (j * 60000));
                    const pPv = satellite.propagate(sat.satrec, pastTime);
                    if (pPv.position) {
                        const pGmst = satellite.gstime(pastTime);
                        const pGd = satellite.eciToGeodetic(pPv.position, pGmst);
                        trailCoords.push([satellite.degreesLat(pGd.latitude), satellite.degreesLong(pGd.longitude)]);
                    }
                }

                // Impede o rasto de "esticar" no fim do mapa
                const lngs = trailCoords.map(c => c[1]);
                if (Math.max(...lngs) - Math.min(...lngs) < 180) {
                    sat.polyline.setLatLngs(trailCoords);
                } else {
                    sat.polyline.setLatLngs([]);
                }
            }
        });
        requestAnimationFrame(updatePositions);
    }

    fetchTLE();
</script>
</body>
</html>
