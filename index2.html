<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker - Heavy Duty Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Painel de Controlo */
        #control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(5, 7, 10, 0.9); border: 1px solid #ffb86c;
            padding: 15px; color: #ffb86c; width: 260px;
            box-shadow: 0 0 15px rgba(255, 184, 108, 0.1);
        }

        .clock-section { border-bottom: 1px solid #ffb86c; padding-bottom: 10px; margin-bottom: 10px; }
        .clock-section span { font-weight: bold; color: #fff; text-shadow: 0 0 5px #ffb86c; }

        #sat-search {
            width: 100%; background: #111; border: 1px solid #ffb86c;
            color: #ffb86c; padding: 5px; font-family: 'Courier New', monospace;
            font-size: 12px; box-sizing: border-box;
        }

        .filter-section { max-height: 300px; overflow-y: auto; margin-top: 10px; scrollbar-width: thin; scrollbar-color: #ffb86c #05070a; }
        .sat-item { font-size: 11px; display: flex; align-items: center; margin-bottom: 4px; padding: 2px; }
        .sat-item:hover { background: rgba(255, 184, 108, 0.1); }
        .sat-item input { margin-right: 8px; accent-color: #ffb86c; }

        /* Estilos Leaflet Otimizados */
        .sat-point { background-color: #fff; border-radius: 50%; border: 1px solid #ffb86c; box-shadow: 0 0 4px #ffb86c; }
        .sat-label { color: #ffb86c !important; font-size: 9px !important; background: none !important; border: none !important; box-shadow: none !important; text-shadow: 1px 1px 2px #000; font-weight: bold; pointer-events: none; }
        
        /* Popup Estilizado */
        .leaflet-popup-content-wrapper { background: rgba(5, 7, 10, 0.95) !important; border-radius: 0px; font-family: 'Courier New', monospace; border: 1px solid #ffb86c; color: #ffb86c !important; }
        .popup-title { border-bottom: 1px solid #ffb86c; margin-bottom: 5px; font-weight: bold; display: block; }
        
        .neon-meteor { filter: url(#neon-glow); stroke-linecap: round; pointer-events: none; }
    </style>
</head>
<body>

<div id="control-panel">
    <div class="clock-section">
        <div>UTC: <span id="utc-clock">00:00:00</span></div>
        <div>LOC: <span id="local-clock">00:00:00</span></div>
    </div>
    <input type="text" id="sat-search" placeholder="PESQUISAR NOME / NORAD ID..." onkeyup="filterList()">
    <div class="filter-section" id="sat-list">A carregar TLE...</div>
</div>

<div id="map"></div>

<svg width="0" height="0">
  <defs>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { worldCopyJump: true, zoomControl: false, attributionControl: false }).setView([20, 0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [4, 4] });
    let satellites = [];

    // Relógio
    setInterval(() => {
        const now = new Date();
        document.getElementById('utc-clock').innerText = now.toISOString().substr(11, 8);
        document.getElementById('local-clock').innerText = now.toLocaleTimeString('pt-PT');
    }, 1000);

    async function fetchTLE() {
        try {
            // USAR O TEU FICHEIRO LOCAL DATA.TLE (Onde colaste o conteúdo do link da Celestrak)
            const response = await fetch('data.tle');
            const data = await response.text();
            processData(data);
        } catch (e) { document.getElementById('sat-list').innerText = "Erro ao ler data.tle"; }
    }

    function processData(data) {
        const lines = data.split('\n').filter(l => l.trim().length > 0);
        const listDiv = document.getElementById('sat-list');
        listDiv.innerHTML = '';
        
        // Limitar processamento inicial para performance (apenas os primeiros 300 ativos)
        // Se quiseres TODOS, remove o .slice(0, 900), mas o mapa pode ficar lento.
        for (let i = 0; i < lines.length - 2; i += 3) {
            const name = lines[i].trim();
            const l1 = lines[i+1];
            const l2 = lines[i+2];
            const noradId = l1.substring(2, 7).trim();
            const satrec = satellite.twoline2satrec(l1, l2);

            if (satrec) {
                const marker = L.marker([0, 0], { icon: satIcon })
                    .bindTooltip(name, { permanent: false, direction: 'right', className: 'sat-label' })
                    .bindPopup("Calculando...", { className: 'sat-popup' });

                const layers = [
                    L.polyline([], { color: '#ff8c00', weight: 3, opacity: 0.2, className: 'neon-meteor' }),
                    L.polyline([], { color: '#ffb86c', weight: 1.5, opacity: 0.4, className: 'neon-meteor' }),
                    L.polyline([], { color: '#ffffff', weight: 0.5, opacity: 0.8, className: 'neon-meteor' })
                ];

                const satObj = { satrec, marker, layers, name, noradId, visible: true, onMap: false };
                satellites.push(satObj);

                // Criar elemento de lista
                const div = document.createElement('div');
                div.className = 'sat-item';
                div.innerHTML = `<input type="checkbox" onchange="toggleSat(${satellites.length-1}, this.checked)"> ${name}`;
                div.setAttribute('data-search', (name + noradId).toUpperCase());
                listDiv.appendChild(div);
                
                // Por defeito, não adicionamos todos ao mapa para não crashar
                // Ativa apenas os primeiros 50
                if (satellites.length < 50) {
                    toggleSat(satellites.length-1, true);
                    div.querySelector('input').checked = true;
                }
            }
        }
        update();
    }

    function toggleSat(index, show) {
        const s = satellites[index];
        s.visible = show;
        if (show) {
            s.marker.addTo(map);
            s.layers.forEach(l => l.addTo(map));
        } else {
            map.removeLayer(s.marker);
            s.layers.forEach(l => map.removeLayer(l));
        }
    }

    function filterList() {
        const q = document.getElementById('sat-search').value.toUpperCase();
        document.querySelectorAll('.sat-item').forEach(item => {
            item.style.display = item.getAttribute('data-search').includes(q) ? 'flex' : 'none';
        });
    }

    function update() {
        const now = new Date();
        const gmst = satellite.gstime(now);

        satellites.forEach(sat => {
            if (!sat.visible) return;
            const posVel = satellite.propagate(sat.satrec, now);
            if (posVel.position) {
                const posGd = satellite.eciToGeodetic(posVel.position, gmst);
                const lat = satellite.degreesLat(posGd.latitude);
                const lng = satellite.degreesLong(posGd.longitude);
                sat.marker.setLatLng([lat, lng]);

                if (sat.marker.isPopupOpen()) {
                    sat.marker.setPopupContent(`<b class="popup-title">${sat.name}</b>NORAD: ${sat.noradId}<br>ALT: ${posGd.height.toFixed(2)}km`);
                }

                // Rasto (Apenas se estiver visível no ecrã para poupar CPU)
                if (map.getBounds().contains(sat.marker.getLatLng())) {
                    let coords = [];
                    for (let j = 0; j <= 0.5; j += 0.2) {
                        const pTime = new Date(now.getTime() - (j * 60000));
                        const pPv = satellite.propagate(sat.satrec, pTime);
                        if (pPv.position) {
                            const pGd = satellite.eciToGeodetic(pPv.position, satellite.gstime(pTime));
                            coords.push([satellite.degreesLat(pGd.latitude), satellite.degreesLong(pGd.longitude)]);
                        }
                    }
                    sat.layers[0].setLatLngs(coords);
                    sat.layers[1].setLatLngs(coords.slice(0, 2));
                    sat.layers[2].setLatLngs(coords.slice(0, 1));
                }
            }
        });
        requestAnimationFrame(update);
    }

    fetchTLE();
</script>
</body>
</html>
