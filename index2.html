<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNC - Global Mission Control v5.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #020408; font-family: 'Courier New', monospace; overflow: hidden; color: #00f2ff; }
        #map { height: 100vh; width: 100%; background: #020408; }

        /* HUD PAINEL */
        #hud {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(2, 4, 8, 0.95); border: 1px solid #00f2ff;
            padding: 15px; width: 320px; border-radius: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .status-bar { border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 8px; margin-bottom: 10px; font-size: 11px; }
        .clock-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .clock-label { color: rgba(0, 242, 255, 0.6); }

        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        button {
            flex: 1; background: transparent; border: 1px solid #00f2ff; color: #00f2ff;
            font-family: 'Courier New'; font-size: 10px; padding: 6px; cursor: pointer; text-transform: uppercase;
        }
        button:hover { background: #00f2ff; color: #000; }

        select, input {
            width: 100%; background: #000; border: 1px solid rgba(0, 242, 255, 0.5);
            color: #00f2ff; padding: 6px; font-family: 'Courier New'; margin-top: 5px; box-sizing: border-box; outline: none;
        }

        #sat-list { 
            max-height: 250px; overflow-y: auto; margin-top: 10px; border-top: 1px solid rgba(0, 242, 255, 0.2);
            scrollbar-width: thin; scrollbar-color: #00f2ff #000;
        }
        .sat-item { display: grid; grid-template-columns: 30px 1fr; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(0, 242, 255, 0.1); cursor: pointer; }
        .sat-item span { font-size: 11px; color: #888; }

        /* ICONS & SATELLITES */
        .sat-icon-minimal { display: flex; align-items: center; justify-content: center; }
        .sat-ring { width: 8px; height: 8px; border: 1.5px solid #00f2ff; border-radius: 50%; animation: ring-pulse 2s infinite ease-out; }
        @keyframes ring-pulse { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

        .sat-label { 
            color: #00f2ff !important; font-size: 10px !important; background: none !important; 
            border: none !important; box-shadow: none !important; text-shadow: 1px 1px 2px #000; 
            margin-left: 10px; padding: 0 !important;
        }

        /* INFRAESTRUTURA ORIGINAL */
        .icon-base { border: 1px solid #ff4e00; background: rgba(255, 78, 0, 0.3); box-shadow: 0 0 5px #ff4e00; }
        .icon-dsn { border: 1px solid #39ff14; background: rgba(57, 255, 20, 0.3); transform: rotate(45deg); box-shadow: 0 0 5px #39ff14; }
        .icon-special-sq { border: 1px solid #ffea00; background: rgba(255, 234, 0, 0.3); box-shadow: 0 0 5px #ffea00; }

        /* POPUPS */
        .leaflet-popup-content-wrapper { background: #000 !important; border: 1px solid #00f2ff; border-radius: 0; color: #fff; font-size: 11px; font-family: 'Courier New'; }
        .pop-title { color: #00f2ff; font-weight: bold; border-bottom: 1px solid #00f2ff; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .pop-val { color: #39ff14; }

        #legend { position: absolute; bottom: 30px; left: 15px; z-index: 1000; background: rgba(2, 4, 8, 0.9); border: 1px solid rgba(0, 242, 255, 0.5); padding: 10px; font-size: 10px; }
        .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .box { width: 8px; height: 8px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="status-bar">
        <div class="clock-row"><span class="clock-label">MCN_UTC:</span> <span id="utc-clock">00:00:00</span></div>
        <div class="clock-row"><span class="clock-label">LOCAL_T:</span> <span id="local-clock">00:00:00</span></div>
    </div>
    <select id="group-select" onchange="loadData(this.value)">
        <option value="data.tle">LOCAL: data.tle</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle">SRC: Stations</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle">SRC: Weather Stations</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=resource&FORMAT=tle">SRC: Earth Resources</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=sarsat&FORMAT=tle">SRC: Search & Rescue (SARSAT)</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=galileo&FORMAT=tle">SRC: Galileo</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=gps-ops&FORMAT=tle">SRC: GPS</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=beidou&FORMAT=tle">SRC: GPS Beidou</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=glo-ops&FORMAT=tle">SRC: GPS Glonass</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=satnogs&FORMAT=tle">SRC: SatNOGS</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=amateur&FORMAT=tle">SRC: Amateur Radio</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle">SRC: Starlink</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=oneweb&FORMAT=tle">SRC: OneWeb</option>
        <option value="https://celestrak.org/NORAD/elements/gp.php?GROUP=military&FORMAT=tle">SRC: Military</option>
    </select>
    <input type="text" id="search-bar" placeholder="FILTER SENSORS..." onkeyup="filterList()">
    <div class="btn-group">
        <button onclick="checkAll(true)">SELECT ALL</button>
        <button onclick="checkAll(false)">CLEAR</button>
    </div>
    <div id="sat-list">SYNCING...</div>
</div>

<div id="legend">
    <div class="leg-item"><div class="box icon-dsn"></div> <span>ESTRACK / DSN / TT&C</span></div>
    <div class="leg-item"><div class="box icon-base"></div> <span>Active Launch Sites</span></div>
    <div class="leg-item"><div class="box icon-special-sq"></div> <span>Custom Sensor Site</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { worldCopyJump: true, zoomControl: false, attributionControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // --- MARCADOR ESPECIAL ---
    const customCoords = [38.6944381, -9.3089739];
    L.marker(customCoords, { icon: L.divIcon({ className: 'icon-special-sq', iconSize: [7, 7] }) })
     .bindPopup(`<span class="pop-title" style="color:#00ffff; border-bottom-color:#4cf85b;">Sensor Site</span><b>Local:</b> Oeiras, Portugal<br><b>Status:</b> <span style="color:#00ff00;">OPERATIONAL</span>`)
     .addTo(map);

    const groundStations = [
        { n: "ESTRACK Santa Maria", c: [36.99, -25.13], t: "Portugal (Açores)", type: "dsn", spec: "15m Dish", func: "Ariane/Vega Tracking" },
        { n: "ESTRACK Kiruna", c: [67.85, 20.96], t: "Sweden", type: "dsn", spec: "Dual 15m/13m", func: "LEO Control" },
        { n: "ESTRACK Kourou", c: [5.20, -52.80], t: "GF", type: "dsn", spec: "15m Dish", func: "Launcher Support" },
        { n: "ESTRACK Malargüe", c: [-35.77, -69.39], t: "Argentina", type: "dsn", spec: "35m DSA-3", func: "Deep Space" },
        { n: "ESTRACK New Norcia", c: [-31.04, 116.19], t: "Australia", type: "dsn", spec: "35m DSA-1", func: "Deep Space" },
        { n: "ESTRACK Cebreros", c: [40.45, -4.36], t: "Spain", type: "dsn", spec: "35m DSA-2", func: "Deep Space" },
        { n: "ESTRACK Redu", c: [50.00, 5.14], t: "Belgium", type: "dsn", spec: "Multi-Dish", func: "IOT Support" },
        { n: "DSN Goldstone", c: [35.42, -116.89], t: "USA", type: "dsn", spec: "70m Dish", func: "Deep Space" },
        { n: "DSN Madrid", c: [40.43, -4.24], t: "Spain", type: "dsn", spec: "70m Dish", func: "Deep Space" },
        { n: "DSN Canberra", c: [-35.40, 148.98], t: "Australia", type: "dsn", spec: "70m Dish", func: "Deep Space" },
        { n: "Kennedy Space Center", c: [28.57, -80.64], t: "USA", type: "base", spec: "LC-39A/B", func: "Heavy Lift" },
        { n: "Vandenberg SFB", c: [34.74, -120.57], t: "USA", type: "base", spec: "Polar Site", func: "Military/Gov" },
        { n: "SpaceX Starbase", c: [25.99, -97.15], t: "USA", type: "base", spec: "Orbital Pad", func: "Starship Dev" },
        { n: "Guiana Space Centre", c: [5.23, -52.76], t: "GF", type: "base", spec: "Ariane 6", func: "ESA Main Site" },
        { n: "Baikonur Cosmodrome", c: [45.96, 63.30], t: "KAZ", type: "base", spec: "Soyuz/Proton", func: "Roscosmos" },
        { n: "Plesetsk Cosmodrome", c: [62.92, 40.57], t: "RUS", type: "base", spec: "Military Pad", func: "Roscosmos" },
        { n: "Vostochny Cosmodrome", c: [51.88, 128.33], t: "RUS", type: "base", spec: "New Site", func: "Roscosmos" },
        { n: "Jiuquan Spaceport", c: [40.96, 100.29], t: "CHN", type: "base", spec: "Gobi Desert", func: "Manned" },
        { n: "Wenchang SC", c: [19.61, 110.95], t: "CHN", type: "base", spec: "Coastal Site", func: "Heavy Lift" },
        { n: "Satish Dhawan SC", c: [13.71, 80.23], t: "India", type: "base", spec: "ISRO Site", func: "PSLV/GSLV" },
        { n: "Tanegashima SC", c: [30.37, 130.95], t: "Japan", type: "base", spec: "JAXA Pad", func: "H-II/H3" },
        { n: "Rocket Lab LC-1", c: [-39.26, 177.86], t: "NZ", type: "base", spec: "Private Site", func: "Electron" },
        { n: "Alcântara Space Center", c: [-2.34, -44.40], t: "Brazil", type: "base", spec: "Equatorial", func: "VLS Program" }
    ];

    groundStations.forEach(s => {
        const cls = s.type === 'base' ? 'icon-base' : 'icon-dsn';
        L.marker(s.c, { icon: L.divIcon({className: cls, iconSize:[7,7]}) })
         .bindPopup(`<span class="pop-title">${s.n}</span><b>Nation:</b> ${s.t}<br><b>Specs:</b> <span class="pop-val">${s.spec}</span><br><b>Task:</b> ${s.func}`)
         .addTo(map);
    });

    let satellites = [];
    const satIcon = L.divIcon({ className: 'sat-icon-minimal', html: '<div class="sat-ring"></div>', iconSize: [16, 16] });

    async function loadData(source) {
        satellites.forEach(s => { 
            map.removeLayer(s.marker); 
            s.trails.forEach(t => map.removeLayer(t)); 
            if(s.footprint) map.removeLayer(s.footprint);
        });
        satellites = [];
        try {
            const resp = await fetch(source);
            const data = await resp.text();
            parseTLE(data);
        } catch (e) { document.getElementById('sat-list').innerHTML = "ERR: NO_TLE_STREAM"; }
    }

    function parseTLE(data) {
        const lines = data.split('\n').filter(l => l.trim().length > 0);
        const listDiv = document.getElementById('sat-list');
        listDiv.innerHTML = '';
        for (let i = 0; i < lines.length - 2; i += 3) {
            const name = lines[i].trim();
            const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
            if (!satrec) continue;

            const marker = L.marker([0, 0], { icon: satIcon })
                .bindTooltip(name, { permanent: true, direction: 'right', className: 'sat-label' })
                .bindPopup(""); 

            const trails = [L.polyline([], { color: '#00f2ff', weight: 1, opacity: 0.5, dashArray: '2, 5', interactive: false })];
            const footprint = L.circle([0, 0], { radius: 0, color: '#00f2ff', weight: 1, fillColor: '#00f2ff', fillOpacity: 0.05, interactive: false });

            const satObj = { name, satrec, marker, trails, footprint, active: false };
            
            // CORREÇÃO: Atualiza os dados IMEDIATAMENTE no clique
            marker.on('click', () => {
                updateSatPopup(satObj);
                marker.openPopup();
            });

            satellites.push(satObj);

            const div = document.createElement('div');
            div.className = 'sat-item';
            div.innerHTML = `<input type="checkbox" class="sat-check"> <span>${name}</span>`;
            const check = div.querySelector('input');
            check.onchange = (e) => toggleSat(satObj, e.target.checked);
            div.onclick = (e) => { if(e.target !== check) { check.checked = !check.checked; toggleSat(satObj, check.checked); } };
            listDiv.appendChild(div);
        }
    }

    function updateSatPopup(sat) {
        const now = new Date();
        const gmst = satellite.gstime(now);
        const pv = satellite.propagate(sat.satrec, now);
        
        if (pv.position && pv.velocity) {
            const gd = satellite.eciToGeodetic(pv.position, gmst);
            
            const noradId = sat.satrec.satnum;
            const line1 = sat.satrec.line1; 
            const launchYearShort = parseInt(line1.substring(9, 11));
            const fullYear = launchYearShort > 50 ? 1900 + launchYearShort : 2000 + launchYearShort;
            const age = new Date().getFullYear() - fullYear;

            let health, healthColor;
            if (age > 25) { health = "SPACE DEBRIS / INACTIVE"; healthColor = "#ff4e00"; }
            else if (age > 15) { health = "EXTENDED MISSION"; healthColor = "#ffea00"; }
            else { health = "OPERATIONAL / NOMINAL"; healthColor = "#39ff14"; }

            const speedKms = Math.sqrt(Math.pow(pv.velocity.x, 2) + Math.pow(pv.velocity.y, 2) + Math.pow(pv.velocity.z, 2));
            const speedKmh = speedKms * 3600;

            sat.marker.setPopupContent(`
                <span class="pop-title">${sat.name}</span>
                NORAD ID: <span class="pop-val">${noradId}</span><br>
                STATUS: <span style="color:${healthColor}; font-weight:bold;">${health}</span><br>
                LANÇAMENTO: <span class="pop-val">${fullYear}</span> (${age}a em órbita)<br>
                <hr style="border:0; border-top:1px solid rgba(0,242,255,0.2); margin:5px 0;">
                ALTITUDE: <span class="pop-val">${gd.height.toFixed(1)} KM</span><br>
                VELOCIDADE: <span class="pop-val">${speedKms.toFixed(2)} KM/S</span><br>
                <span style="font-size:9px; color:#890;">(${speedKmh.toLocaleString('pt-PT', {maximumFractionDigits:0})} KM/H)</span><br>
                <hr style="border:0; border-top:1px solid rgba(0,242,255,0.1); margin:5px 0;">
                LAT/LNG: ${satellite.degreesLat(gd.latitude).toFixed(3)}°, ${satellite.degreesLong(gd.longitude).toFixed(3)}°
            `);
            
            if (sat.marker.getPopup()) sat.marker.getPopup().update();
        }
    }

    function toggleSat(sat, show) {
        sat.active = show;
        if (show) { 
            sat.marker.addTo(map); 
            sat.trails.forEach(t => t.addTo(map)); 
            sat.footprint.addTo(map);
        } else { 
            map.removeLayer(sat.marker); 
            sat.trails.forEach(t => map.removeLayer(t)); 
            map.removeLayer(sat.footprint);
        }
    }

    function checkAll(val) {
        document.querySelectorAll('.sat-check').forEach((cb, idx) => {
            cb.checked = val;
            toggleSat(satellites[idx], val);
        });
    }

    function update() {
        const now = new Date();
        const gmst = satellite.gstime(now);
        const R_EARTH = 6371;

        satellites.forEach(sat => {
            if (!sat.active) return;
            const pv = satellite.propagate(sat.satrec, now);
            if (pv.position) {
                const gd = satellite.eciToGeodetic(pv.position, gmst);
                const lat = satellite.degreesLat(gd.latitude);
                const lng = satellite.degreesLong(gd.longitude);
                sat.marker.setLatLng([lat, lng]);
                
                const horizonAngle = Math.acos(R_EARTH / (R_EARTH + gd.height));
                sat.footprint.setLatLng([lat, lng]);
                sat.footprint.setRadius(R_EARTH * horizonAngle * 1000);

                if (sat.marker.isPopupOpen()) updateSatPopup(sat);
                
                let pts = [];
                for(let i=0; i<8; i++){
                    const t = new Date(now.getTime() - (i*25000));
                    const p = satellite.propagate(sat.satrec, t);
                    if(p.position){
                        const g = satellite.eciToGeodetic(p.position, satellite.gstime(t));
                        pts.push([satellite.degreesLat(g.latitude), satellite.degreesLong(g.longitude)]);
                    }
                }
                if(pts.length > 1 && Math.abs(pts[0][1] - pts[pts.length-1][1]) < 180) {
                    sat.trails.forEach(tr => tr.setLatLngs(pts));
                }
            }
        });
        requestAnimationFrame(update);
    }

    function filterList() {
        const q = document.getElementById('search-bar').value.toUpperCase();
        document.querySelectorAll('.sat-item').forEach(el => {
            el.style.display = el.innerText.toUpperCase().includes(q) ? 'grid' : 'none';
        });
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('utc-clock').innerText = now.toISOString().substr(11, 8);
        document.getElementById('local-clock').innerText = now.toLocaleTimeString();
    }, 1000);

    loadData('data.tle');
    update();
</script>
</body>
</html>
