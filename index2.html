<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #05070a; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #05070a; }

        /* Bases ainda menores como pediste */
        .base-square {
            background-color: transparent;
            border: 1.5px solid #00f2ff;
            box-shadow: 0 0 5px #00f2ff;
        }

        /* Satélites (Pontos Laranja da imagem) */
        .sat-point {
            background-color: #ffb86c;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffb86c;
            border: 1px solid #fff;
        }

        /* Nomes dos Satélites conforme a imagem */
        .sat-label {
            color: #ffb86c !important;
            font-size: 9px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
            margin-left: 5px;
        }

        /* Estilo Dark */
        .leaflet-container { background: #05070a !important; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

<script>
    const map = L.map('map', { 
        worldCopyJump: true, 
        zoomControl: false,
        attributionControl: false 
    }).setView([20, 0], 3);

    // Camada de mapa ultra escura
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const baseIcon = L.divIcon({ className: 'base-square', iconSize: [8, 8] }); // Tamanho reduzido
    const satIcon = L.divIcon({ className: 'sat-point', iconSize: [5, 5] });

    // Bases de Lançamento
    const launchBases = [
        { name: "Kennedy Space Center", coords: [28.57, -80.64] },
        { name: "Baikonur", coords: [45.96, 63.30] },
        { name: "Kourou", coords: [5.23, -52.76] },
        { name: "Plesetsk", coords: [62.92, 40.57] },
        { name: "Jiuquan", coords: [40.96, 100.29] },
        { name: "Alcântara", coords: [-2.37, -44.39] }
    ];

    launchBases.forEach(base => {
        L.marker(base.coords, { icon: baseIcon }).bindPopup(base.name).addTo(map);
    });

    let satellites = [];

    async function fetchTLE() {
        const tleUrl = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle';
        
        // ATENÇÃO: Se o link direto falhar no GitHub, é OBRIGATÓRIO usar um proxy 
        // porque o Celestrak bloqueia navegadores. Usei o mais estável aqui:
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(tleUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = json.contents;
            
            const lines = data.split('\n').filter(l => l.trim().length > 0);
            
            // Limpa marcadores antigos
            satellites.forEach(s => map.removeLayer(s.marker));
            satellites = [];

            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i].trim();
                const tle1 = lines[i+1].trim();
                const tle2 = lines[i+2].trim();
                
                try {
                    const satrec = satellite.twoline2satrec(tle1, tle2);
                    const marker = L.marker([0, 0], { icon: satIcon })
                        .bindTooltip(name, { 
                            permanent: true, 
                            direction: 'right', 
                            className: 'sat-label' 
                        })
                        .addTo(map);

                    satellites.push({ name, satrec, marker });
                } catch (e) {}
            }
            updatePositions();
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
        }
    }

    function updatePositions() {
        const now = new Date();
        satellites.forEach(sat => {
            const posVel = satellite.propagate(sat.satrec, now);
            const posEci = posVel.position;
            
            if (posEci) {
                const gmst = satellite.gstime(now);
                const posGd = satellite.eciToGeodetic(posEci, gmst);
                sat.marker.setLatLng([
                    satellite.degreesLat(posGd.latitude),
                    satellite.degreesLong(posGd.longitude)
                ]);
            }
        });
        requestAnimationFrame(updatePositions);
    }

    // Carrega dados agora
    fetchTLE();
    
    // Atualiza a cada 12 horas (12h * 60m * 60s * 1000ms)
    setInterval(fetchTLE, 43200000);

</script>
</body>
</html>
